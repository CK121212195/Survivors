<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Clean FPS</title>
    <style>
        /* GIFの雰囲気を完全再現するクリーンなUI設定 */
        body { margin: 0; overflow: hidden; background-color: #3b3b3b; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; color: white; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        
        /* 画面中央の照準 */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #ffffff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 6px rgba(0,0,0,0.8); }
        
        /* 画面上部のCHARGEゲージ (GIF完全再現) */
        #charge-container { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 320px; display: flex; flex-direction: column; align-items: center; }
        #charge-text { font-size: 13px; font-weight: 700; letter-spacing: 8px; margin-bottom: 12px; color: #a0a0a0; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        #charge-bar-bg { width: 100%; height: 3px; background: rgba(255, 255, 255, 0.15); border-radius: 2px; }
        #charge-bar-fill { width: 0%; height: 100%; background: #aaddff; border-radius: 2px; transition: width 0.1s linear, background-color 0.2s; box-shadow: 0 0 8px rgba(170, 221, 255, 0.5); }
        #charge-bar-fill.overheat { background: #ff4444; box-shadow: 0 0 10px rgba(255, 68, 68, 0.8); }

        /* 画面左上の操作UI (GIF完全再現) */
        #controls-info { position: absolute; top: 35px; left: 35px; display: flex; flex-direction: column; gap: 8px; }
        .control-item { display: flex; align-items: center; color: #bbbbbb; font-size: 11px; font-weight: 700; background: rgba(20, 20, 20, 0.6); padding: 8px 20px 8px 8px; border-radius: 8px; letter-spacing: 1px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.05); }
        .icon { width: 24px; height: 24px; background: rgba(255,255,255,0.08); border-radius: 4px; display: inline-flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); color: #fff;}

        /* スコアとタイマー (ゲーム性は維持しつつ邪魔にならない右上に) */
        #stats-info { position: absolute; top: 35px; right: 40px; display: flex; gap: 40px; text-align: right; }
        .stat-box { display: flex; flex-direction: column; align-items: flex-end; }
        .stat-label { font-size: 11px; color: #888; letter-spacing: 2px; font-weight: 700; margin-bottom: 4px; }
        .stat-value { font-size: 36px; font-weight: 800; color: #fff; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        #timer.danger { color: #ff4444; }

        /* 洗練されたメニュー画面 */
        #menu-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 30, 32, 0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; pointer-events: auto; }
        .menu-title { font-size: 56px; font-weight: 900; letter-spacing: 12px; margin-bottom: 40px; color: #fff; }
        .btn { background: #fff; border: none; color: #000; padding: 18px 48px; font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: 4px; border-radius: 30px; transition: 0.2s; margin: 10px; }
        .btn:hover { background: #aaddff; transform: scale(1.05); }
        #final-score { font-size: 24px; color: #aaa; margin-bottom: 40px; display: none; font-weight: 700; letter-spacing: 2px; }
        #final-score span { font-size: 48px; color: #fff; display: block; margin-top: 10px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="crosshair"></div>
        <div id="controls-info">
            <div class="control-item"><span class="icon">⌨️</span> MOVE</div>
            <div class="control-item"><span class="icon">🖱️</span> LOOK</div>
            <div class="control-item"><span class="icon" style="color:#ff6666;">🔴</span> FIRE</div>
            <div class="control-item"><span class="icon">ESC</span> MENU</div>
        </div>
        <div id="charge-container">
            <div id="charge-text">CHARGE</div>
            <div id="charge-bar-bg"><div id="charge-bar-fill"></div></div>
        </div>
        <div id="stats-info">
            <div class="stat-box"><span class="stat-label">SCORE</span><span class="stat-value" id="score-val">0</span></div>
            <div class="stat-box"><span class="stat-label">TIME</span><span class="stat-value" id="time-val">60.0</span></div>
        </div>
    </div>

    <div id="menu-layer">
        <div class="menu-title" id="menu-title">CLEAN SHOOTER</div>
        <div id="final-score">FINAL SCORE<br><span id="result-score">0</span></div>
        <div id="btn-container"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 状態管理 ---
        let gameState = 'MENU';
        let score = 0; let timeLeft = 60.0;
        let weaponHeat = 0; let isOverheated = false;
        let isFiring = false; let fireTimer = 0; const FIRE_RATE = 0.12;

        const hud = document.getElementById('hud');
        const menuLayer = document.getElementById('menu-layer');
        const menuTitle = document.getElementById('menu-title');
        const btnContainer = document.getElementById('btn-container');
        const finalScoreDisplay = document.getElementById('final-score');
        const scoreVal = document.getElementById('score-val');
        const timeVal = document.getElementById('time-val');
        const chargeBarFill = document.getElementById('charge-bar-fill');
        const chargeText = document.getElementById('charge-text');

        // --- 1. 画質最優先のクリーンなレンダラー ---
        // 余計なポストプロセスを捨て、ネイティブの強力なアンチエイリアスを使用
        const scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x333333 );
        scene.fog = new THREE.Fog( 0x333333, 20, 100 ); // 霞を自然なグラデーションに

        const camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
        camera.position.y = 1.6;
        
        const renderer = new THREE.WebGLRenderer( { antialias: true, powerPreference: "high-performance" } );
        renderer.setSize( window.innerWidth, window.innerHeight );
        renderer.setPixelRatio( Math.min(window.devicePixelRatio, 2) ); // 高画質化
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 影を極限まで柔らかく
        document.body.appendChild( renderer.domElement );

        // --- 2. スタジオのような柔らかい照明 ---
        const hemiLight = new THREE.HemisphereLight( 0xffffff, 0x444444, 0.6 );
        hemiLight.position.set( 0, 20, 0 );
        scene.add( hemiLight );

        const dirLight = new THREE.DirectionalLight( 0xffffff, 0.8 );
        dirLight.position.set( 20, 30, 20 );
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.0001;
        scene.add( dirLight );

        // --- 3. クリーンなステージ構築 ---
        const floorGeo = new THREE.PlaneGeometry( 200, 200 );
        const floorMat = new THREE.MeshStandardMaterial( { color: 0x444444, roughness: 1.0, metalness: 0.0 } );
        const floor = new THREE.Mesh( floorGeo, floorMat );
        floor.rotation.x = - Math.PI / 2;
        floor.receiveShadow = true;
        scene.add( floor );

        // 無機質なブロック
        const boxGeo = new THREE.BoxGeometry( 2, 2, 2 );
        const boxMat = new THREE.MeshStandardMaterial( { color: 0x555555, roughness: 0.8 } );
        for ( let i = 0; i < 25; i ++ ) {
            const box = new THREE.Mesh( boxGeo, boxMat );
            box.position.set( (Math.random() - 0.5) * 80, 1, -10 - Math.random() * 60 );
            box.castShadow = true; box.receiveShadow = true;
            scene.add( box );
        }

        // --- 4. ポップで滑らかな敵 (GIF完全再現) ---
        const enemies = [];
        // CapsuleGeometryで丸みのある綺麗なカプセル型に
        const enemyGeo = new THREE.CapsuleGeometry( 0.6, 1.2, 16, 32 );
        const baseEnemyMat = new THREE.MeshStandardMaterial( { 
            color: 0xff5522, // 鮮やかなオレンジ
            roughness: 0.2,  // 少しツヤを持たせる
            metalness: 0.1
        } );

        function spawnEnemy(x, z) {
            const enemy = new THREE.Mesh( enemyGeo, baseEnemyMat.clone() );
            enemy.position.set( x || (Math.random() - 0.5) * 60, 1.2, z || -15 - Math.random() * 40 );
            enemy.castShadow = true;
            enemy.userData = { active: true, hp: 3, hitTimer: 0 };
            scene.add( enemy );
            enemies.push( enemy );
        }
        for(let i=0; i<8; i++) spawnEnemy();

        // --- 5. 美しい大砲 (GIFの右下の武器) ---
        const weaponGroup = new THREE.Group();
        
        // 武器のメインバレル (滑らかで太いカプセル型)
        const weaponGeo = new THREE.CapsuleGeometry( 0.4, 1.5, 32, 32 );
        weaponGeo.rotateX( Math.PI / 2 );
        const weaponMat = new THREE.MeshStandardMaterial( { color: 0x44aaff, roughness: 0.2, metalness: 0.1 } );
        const weaponMesh = new THREE.Mesh( weaponGeo, weaponMat );
        weaponMesh.position.set( 0.9, -0.6, -1.2 ); // 右下に配置
        weaponMesh.castShadow = true;
        
        // 銃口の白い縁取り
        const muzzleGeo = new THREE.TorusGeometry( 0.4, 0.08, 16, 32 );
        const muzzleMat = new THREE.MeshStandardMaterial( { color: 0xffffff, roughness: 0.5 } );
        const muzzle = new THREE.Mesh( muzzleGeo, muzzleMat );
        muzzle.position.set( 0, 0, -1.1 );
        weaponMesh.add( muzzle );

        weaponGroup.add( weaponMesh );
        camera.add( weaponGroup );
        scene.add( camera );

        // --- 6. 光弾と破裂パーティクル ---
        const projectiles = [];
        const projGeo = new THREE.SphereGeometry( 0.15, 16, 16 ); // 丸い光の弾
        const projMat = new THREE.MeshBasicMaterial( { color: 0xffaa55 } ); // 光沢のあるオレンジ

        function fireProjectile() {
            if(isOverheated) return;

            weaponHeat += 6;
            if (weaponHeat >= 100) {
                isOverheated = true; weaponHeat = 100;
                chargeText.innerText = "OVERHEATED"; chargeText.style.color = "#ff4444";
                chargeBarFill.classList.add('overheat');
            }

            // 武器の心地よい反動
            weaponMesh.position.z += 0.2;
            weaponMesh.rotation.x -= 0.05;

            // 弾の発射
            const bullet = new THREE.Mesh( projGeo, projMat );
            const startPos = new THREE.Vector3( 0.9, -0.6, -2.5 );
            camera.localToWorld( startPos );
            bullet.position.copy( startPos );
            
            const target = new THREE.Vector3( 0, 0, -50 );
            camera.localToWorld( target );
            bullet.lookAt( target );
            
            const velocity = new THREE.Vector3( 0, 0, -1 ).applyQuaternion( bullet.quaternion ).multiplyScalar( 100 ); // 弾速を向上
            
            scene.add( bullet );
            projectiles.push( { mesh: bullet, velocity: velocity, life: 1.5 } );
        }

        // 破裂パーティクル (汚い四角ではなく、綺麗な丸い破片に)
        const particles = [];
        const partGeo = new THREE.SphereGeometry( 0.15, 8, 8 );
        function createExplosion( pos ) {
            const mat = new THREE.MeshStandardMaterial( { color: 0xff5522, roughness: 0.2 } );
            for(let i=0; i<25; i++) {
                const mesh = new THREE.Mesh( partGeo, mat );
                mesh.position.copy( pos );
                const vel = new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2).normalize().multiplyScalar(8 + Math.random()*12);
                scene.add( mesh );
                particles.push( { mesh, vel, life: 1.0 } );
            }
        }

        // --- 7. コントロールとメニュー ---
        const controls = new PointerLockControls( camera, document.body );
        
        function setMenu(state) {
            btnContainer.innerHTML = '';
            finalScoreDisplay.style.display = 'none';
            if(state === 'START') {
                menuTitle.innerText = "CLEAN SHOOTER";
                const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = 'START GAME';
                btn.onclick = () => { startGame(); controls.lock(); }; btnContainer.appendChild(btn);
            } else if(state === 'PAUSE') {
                menuTitle.innerText = "PAUSED";
                const btnRes = document.createElement('button'); btnRes.className = 'btn'; btnRes.innerText = 'RESUME';
                btnRes.onclick = () => controls.lock();
                btnContainer.appendChild(btnRes);
            } else if(state === 'GAMEOVER') {
                menuTitle.innerText = "TIME UP";
                finalScoreDisplay.style.display = 'block'; document.getElementById('result-score').innerText = score;
                const btnRetry = document.createElement('button'); btnRetry.className = 'btn'; btnRetry.innerText = 'TRY AGAIN';
                btnRetry.onclick = () => { startGame(); controls.lock(); }; btnContainer.appendChild(btnRetry);
            }
        }
        setMenu('START');

        controls.addEventListener( 'lock', () => { gameState = 'PLAYING'; menuLayer.style.display = 'none'; hud.style.display = 'block'; });
        controls.addEventListener( 'unlock', () => { if(gameState === 'PLAYING') { gameState = 'PAUSE'; menuLayer.style.display = 'flex'; hud.style.display = 'none'; setMenu('PAUSE'); } });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        document.addEventListener('mousedown', e => { if(e.button === 0 && gameState === 'PLAYING') isFiring = true; });
        document.addEventListener('mouseup', e => { if(e.button === 0) isFiring = false; });

        function startGame() {
            score = 0; timeLeft = 60.0; weaponHeat = 0; isOverheated = false; isFiring = false;
            scoreVal.innerText = score; chargeText.innerText = "CHARGE"; chargeText.style.color = "#a0a0a0"; chargeBarFill.classList.remove('overheat');
            enemies.forEach(e => scene.remove(e)); enemies.length = 0;
            for(let i=0; i<8; i++) spawnEnemy();
        }

        // --- 8. メインループ ---
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3(); const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (gameState === 'PLAYING') {
                timeLeft -= delta;
                if(timeLeft <= 0) {
                    timeLeft = 0; gameState = 'GAMEOVER'; document.exitPointerLock();
                    menuLayer.style.display = 'flex'; hud.style.display = 'none'; setMenu('GAMEOVER');
                }
                timeVal.innerText = timeLeft.toFixed(1);
                if(timeLeft <= 10) timeVal.parentElement.id = 'timer', timeVal.parentElement.classList.add('danger');
                else timeVal.parentElement.classList.remove('danger');

                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(keys.w) - Number(keys.s); direction.x = Number(keys.d) - Number(keys.a); direction.normalize();
                const speed = 50.0;
                if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);

                if(isFiring && !isOverheated) {
                    fireTimer -= delta;
                    if(fireTimer <= 0) { fireProjectile(); fireTimer = FIRE_RATE; }
                } else {
                    if(weaponHeat > 0) weaponHeat -= delta * 50; // 冷却を少し早く
                    if(weaponHeat <= 0) {
                        weaponHeat = 0; isOverheated = false;
                        chargeText.innerText = "CHARGE"; chargeText.style.color = "#a0a0a0";
                        chargeBarFill.classList.remove('overheat');
                    }
                }
                chargeBarFill.style.width = `${weaponHeat}%`;

                // 弾丸の処理
                for(let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.life -= delta;

                    let hit = false;
                    for(let j = 0; j < enemies.length; j++) {
                        const enemy = enemies[j];
                        if(!enemy.userData.active) continue;
                        
                        // ヒット判定
                        if(p.mesh.position.distanceTo(enemy.position) < 1.4) {
                            hit = true;
                            enemy.userData.hp--;
                            
                            // 被弾リアクション（白く光ってグシャっと潰れる）
                            enemy.material = new THREE.MeshBasicMaterial({color: 0xffffff}); // 完全に白く発光
                            enemy.scale.set(1.4, 0.6, 1.4); // 横に広がり縦に潰れる
                            enemy.userData.hitTimer = 0.1;

                            if(enemy.userData.hp <= 0) {
                                enemy.userData.active = false;
                                scene.remove(enemy);
                                createExplosion(enemy.position);
                                score += 100; timeLeft = Math.min(timeLeft + 2.0, 99.9);
                                scoreVal.innerText = score;
                                setTimeout(() => spawnEnemy(), 1000);
                            }
                            break;
                        }
                    }
                    if(hit || p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
                }

                // 敵のリアクション（潰れ）を滑らかに戻す
                enemies.forEach(enemy => {
                    if(enemy.userData.active) {
                        if(enemy.userData.hitTimer > 0) {
                            enemy.userData.hitTimer -= delta;
                            if(enemy.userData.hitTimer <= 0) {
                                enemy.material = baseEnemyMat; // 元の質感に戻す
                            }
                        } else {
                            // ゴムのように滑らかに元の形（スケール1）に戻る
                            enemy.scale.lerp(new THREE.Vector3(1, 1, 1), delta * 15);
                        }
                    }
                });

                // 武器の滑らかなリコイル戻し
                if(weaponMesh.position.z > -1.2) weaponMesh.position.z -= delta * 3;
                if(weaponMesh.rotation.x < 0) weaponMesh.rotation.x += delta * 2;
            }

            // パーティクルの処理
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta * 1.5;
                p.vel.y -= 25 * delta; // 重力
                p.mesh.position.addScaledVector(p.vel, delta);
                p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            // Composerを捨ててネイティブ描画（ジャギジャギにならない）
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
