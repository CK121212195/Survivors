<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Photon Shooter</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

#ui{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    z-index:100;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
}

#chargeBar{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:12px;
    border:1px solid white;
}

#chargeFill{
    width:100%;
    height:100%;
    background:#66ccff;
}

#info{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
}
</style>
</head>
<body>

<div id="ui">
WASD 移動<br>
クリックで射撃
</div>

<div id="crosshair">+</div>

<div id="chargeBar">
<div id="chargeFill"></div>
</div>

<div id="info">Enemies: 5</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.167.1/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x111111,20,80);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.shadowMap.enabled=true;

document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(
0xffffff,
100,
100
);

light.position.set(0,10,0);
scene.add(light);

scene.add(new THREE.AmbientLight(
0xffffff,
0.3
));

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({
color:0x222222
})
);

floor.rotation.x = -Math.PI/2;
scene.add(floor);

camera.position.set(0,2,10);

const enemies=[];

for(let i=0;i<5;i++){

const enemy = new THREE.Mesh(
new THREE.CapsuleGeometry(0.7,1.4,4,8),
new THREE.MeshStandardMaterial({
color:0xff4444,
emissive:0x550000
})
);

enemy.position.set(
(Math.random()-0.5)*30,
1,
-Math.random()*30
);

enemy.health=3;

scene.add(enemy);

enemies.push(enemy);

}

const gun = new THREE.Mesh(
new THREE.CapsuleGeometry(0.4,2),
new THREE.MeshStandardMaterial({
color:0x55aaff,
emissive:0x2255ff
})
);

gun.rotation.z=Math.PI/2;
gun.position.set(1,-1,-2);

camera.add(gun);
scene.add(camera);

let charge=100;

document.addEventListener('click',shoot);

function shoot(){

if(charge<10)return;

charge-=10;

document.getElementById("chargeFill").style.width=
charge+"%";

const raycaster = new THREE.Raycaster();

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
);

const hits = raycaster.intersectObjects(enemies);

if(hits.length){

const enemy=hits[0].object;

enemy.health--;

enemy.material.color.set(0xffffff);

setTimeout(()=>{
enemy.material.color.set(0xff4444);
},100);

if(enemy.health<=0){

scene.remove(enemy);

const index=enemies.indexOf(enemy);

if(index>-1){
enemies.splice(index,1);
}

document.getElementById("info").innerHTML=
"Enemies: "+enemies.length;
}
}

const beam = new THREE.Mesh(
new THREE.CylinderGeometry(
0.05,
0.05,
15
),
new THREE.MeshBasicMaterial({
color:0xffaa55
})
);

beam.rotation.x=Math.PI/2;

beam.position.copy(camera.position);

scene.add(beam);

setTimeout(()=>{
scene.remove(beam);
},50);

}

setInterval(()=>{
charge=Math.min(100,charge+1);

document.getElementById("chargeFill").style.width=
charge+"%";
},100);

const keys={};

window.addEventListener("keydown",
e=>keys[e.key.toLowerCase()]=true);

window.addEventListener("keyup",
e=>keys[e.key.toLowerCase()]=false);

function animate(){

requestAnimationFrame(animate);

if(keys["w"]) camera.position.z-=0.15;
if(keys["s"]) camera.position.z+=0.15;
if(keys["a"]) camera.position.x-=0.15;
if(keys["d"]) camera.position.x+=0.15;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
