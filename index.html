<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Beautiful Web FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Inter', 'Segoe UI', sans-serif; user-select: none; }
        
        /* リッチなUIレイヤー */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
        
        #charge-container { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 400px; display: flex; flex-direction: column; align-items: center; }
        #charge-text { color: #fff; font-size: 14px; letter-spacing: 8px; margin-bottom: 10px; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #charge-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); }
        #charge-bar-fill { width: 65%; height: 100%; background: linear-gradient(90deg, #0055ff, #00ffff); box-shadow: 0 0 15px #00ffff; }
        
        #controls-info { position: absolute; top: 40px; left: 40px; display: flex; flex-direction: column; gap: 15px; }
        .control-item { display: flex; align-items: center; color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 700; letter-spacing: 2px;}
        .icon { width: 32px; height: 32px; background: rgba(255,255,255,0.03); border-radius: 6px; display: inline-flex; justify-content: center; align-items: center; margin-right: 15px; border: 1px solid rgba(255,255,255,0.1); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; pointer-events: auto; z-index: 10; transition: opacity 0.5s; }
        #start-screen h1 { margin: 0 0 15px 0; font-size: 64px; letter-spacing: 8px; font-weight: 900; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #start-screen p { font-size: 14px; color: #888; letter-spacing: 2px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="charge-container">
            <div id="charge-text">CHARGE</div>
            <div id="charge-bar-bg"><div id="charge-bar-fill"></div></div>
        </div>
        <div id="controls-info">
            <div class="control-item"><span class="icon">WASD</span> MOVE</div>
            <div class="control-item"><span class="icon">🖱️</span> LOOK</div>
            <div class="control-item"><span class="icon" style="color:#ff3366;">🔴</span> FIRE</div>
        </div>
    </div>

    <div id="start-screen">
        <h1>SYSTEM READY</h1>
        <p>CLICK TO INITIALIZE COMBAT MODE</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        // 美麗化のためのポストプロセス用モジュール
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // 1. 基本セットアップ
        const scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x050508 );
        scene.fog = new THREE.FogExp2( 0x050508, 0.03 ); // より濃い霧で雰囲気を出す

        const camera = new THREE.PerspectiveCamera( 85, window.innerWidth / window.innerHeight, 0.1, 1000 );
        camera.position.y = 1.6;

        const renderer = new THREE.WebGLRenderer( { antialias: true, powerPreference: "high-performance" } );
        renderer.setSize( window.innerWidth, window.innerHeight );
        renderer.setPixelRatio( window.devicePixelRatio );
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // 映画のような色調補正
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔らかい影
        document.body.appendChild( renderer.domElement );

        // 2. ポストプロセス (Bloomエフェクト) の設定
        const renderScene = new RenderPass( scene, camera );
        // パラメータ: 解像度, 強さ(Strength), 半径(Radius), 閾値(Threshold)
        const bloomPass = new UnrealBloomPass( new THREE.Vector2( window.innerWidth, window.innerHeight ), 1.5, 0.4, 0.85 );
        bloomPass.threshold = 0.5; // 光らせる明るさの閾値
        bloomPass.strength = 1.2;  // 光の強さ
        bloomPass.radius = 0.8;    // 光の広がり
        const outputPass = new OutputPass();

        const composer = new EffectComposer( renderer );
        composer.addPass( renderScene );
        composer.addPass( bloomPass );
        composer.addPass( outputPass );

        // 3. ライティング
        const ambientLight = new THREE.AmbientLight( 0xffffff, 0.05 );
        scene.add( ambientLight );

        const dirLight = new THREE.DirectionalLight( 0xddeeff, 1 );
        dirLight.position.set( -10, 20, -10 );
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add( dirLight );

        // プレイヤーの周囲を照らす青い光
        const pointLight = new THREE.PointLight( 0x0055ff, 2, 20 );
        camera.add( pointLight );

        // 4. マップ作成（サイバーなグリッド床）
        const floorGeo = new THREE.PlaneGeometry( 400, 400 );
        const floorMat = new THREE.MeshStandardMaterial( { 
            color: 0x111111, roughness: 0.1, metalness: 0.8 // 反射する黒い床
        });
        const floor = new THREE.Mesh( floorGeo, floorMat );
        floor.rotation.x = - Math.PI / 2;
        floor.receiveShadow = true;
        scene.add( floor );

        const gridHelper = new THREE.GridHelper( 400, 100, 0x00aaff, 0x002244 );
        gridHelper.position.y = 0.01;
        // グリッドを光らせるための設定
        gridHelper.material.emissive = new THREE.Color( 0x002244 );
        scene.add( gridHelper );

        // 障害物
        const obstacles = [];
        const boxGeo = new THREE.BoxGeometry( 3, 4, 3 );
        const boxMat = new THREE.MeshStandardMaterial( { color: 0x222222, roughness: 0.7, metalness: 0.3 } );
        for ( let i = 0; i < 20; i ++ ) {
            const box = new THREE.Mesh( boxGeo, boxMat );
            box.position.set( (Math.random() - 0.5) * 80, 2, (Math.random() - 0.5) * 80 - 20 );
            box.castShadow = true; box.receiveShadow = true;
            scene.add( box );
            obstacles.push(box);
        }

        // 5. 敵（自己発光するオレンジのカプセル）
        const enemies = [];
        const enemyGeo = new THREE.CapsuleGeometry( 0.7, 1.4, 16, 32 );
        const enemyMat = new THREE.MeshStandardMaterial( { 
            color: 0xff3300, 
            emissive: 0xff3300, // 自身を発光させる（Bloomで光が溢れる）
            emissiveIntensity: 1.5,
            roughness: 0.2, metalness: 0.5
        });

        for ( let i = 0; i < 8; i ++ ) {
            const enemy = new THREE.Mesh( enemyGeo, enemyMat.clone() );
            // 初期位置を保存（浮遊アニメーション用）
            enemy.userData = { 
                baseY: 1.5 + Math.random(), 
                floatSpeed: 2 + Math.random() * 2,
                timeOffset: Math.random() * Math.PI * 2
            };
            enemy.position.set( (Math.random() - 0.5) * 50, enemy.userData.baseY, -15 - Math.random() * 40 );
            enemy.castShadow = true;
            scene.add( enemy );
            enemies.push( enemy );
        }

        // 6. プレイヤーの武器（ハイディティール化）
        const weaponGroup = new THREE.Group();
        camera.add( weaponGroup );
        scene.add( camera );

        // 武器のメインバレル
        const barrelGeo = new THREE.CylinderGeometry( 0.2, 0.3, 2.0, 32 );
        barrelGeo.rotateX( Math.PI / 2 );
        const barrelMat = new THREE.MeshStandardMaterial( { color: 0x112244, roughness: 0.4, metalness: 0.8 } );
        const weaponMesh = new THREE.Mesh( barrelGeo, barrelMat );
        weaponMesh.position.set( 0.8, -0.6, -1.2 );
        
        // 武器の発光パーツ
        const glowRingGeo = new THREE.TorusGeometry( 0.31, 0.02, 16, 32 );
        const glowRingMat = new THREE.MeshStandardMaterial( { color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 } );
        const glowRing = new THREE.Mesh( glowRingGeo, glowRingMat );
        glowRing.position.set( 0, 0, -0.6 );
        weaponMesh.add( glowRing );

        weaponGroup.add( weaponMesh );

        // 7. 操作制御
        const controls = new PointerLockControls( camera, document.body );
        const startScreen = document.getElementById( 'start-screen' );

        startScreen.addEventListener( 'click', () => controls.lock() );
        controls.addEventListener( 'lock', () => {
            startScreen.style.opacity = '0';
            setTimeout(() => startScreen.style.display = 'none', 500);
        });
        controls.addEventListener( 'unlock', () => {
            startScreen.style.display = 'flex';
            setTimeout(() => startScreen.style.opacity = '1', 10);
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener( 'keydown', e => {
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });
        document.addEventListener( 'keyup', e => {
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        // --- パーティクルシステム（爆発エフェクト） ---
        const activeParticles = [];
        function createExplosion( position ) {
            const particleCount = 30;
            const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xffaa00, emissive: 0xff5500, emissiveIntensity: 5 
            });

            for(let i=0; i<particleCount; i++) {
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(position);
                
                // ランダムな方向に吹き飛ぶベクトル
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    Math.random() * 10,
                    (Math.random() - 0.5) * 10
                );
                
                scene.add(mesh);
                activeParticles.push({ mesh, velocity, life: 1.0 });
            }
        }

        // 8. 射撃処理
        const raycaster = new THREE.Raycaster();
        let isShooting = false;

        document.addEventListener( 'mousedown', ( e ) => {
            if ( !controls.isLocked || e.button !== 0 || isShooting ) return;
            isShooting = true;

            // リコイル（反動）アニメーション
            weaponMesh.position.z += 0.4;
            weaponMesh.rotation.x -= 0.1;

            // マズルフラッシュ（銃口の発光）
            pointLight.color.setHex(0xffffff);
            pointLight.intensity = 10;
            setTimeout(() => {
                pointLight.color.setHex(0x0055ff);
                pointLight.intensity = 2;
            }, 50);

            // 当たり判定
            raycaster.setFromCamera( new THREE.Vector2(0,0), camera );
            const intersects = raycaster.intersectObjects( enemies );
            let targetPoint = new THREE.Vector3();

            if ( intersects.length > 0 ) {
                const hitEnemy = intersects[ 0 ].object;
                targetPoint = intersects[ 0 ].point;
                
                // 敵の被弾リアクション（白くフラッシュして潰れる）
                hitEnemy.material.emissive.setHex( 0xffffff );
                hitEnemy.scale.set( 1.4, 0.6, 1.4 );
                createExplosion( targetPoint ); // パーティクル発生

                setTimeout(() => {
                    hitEnemy.material.emissive.setHex( 0xff3300 );
                    hitEnemy.scale.set( 1, 1, 1 );
                }, 100);
            } else {
                // 外れた場合
                const envHits = raycaster.intersectObjects( [floor, ...obstacles] );
                if(envHits.length > 0) {
                    targetPoint = envHits[0].point;
                    createExplosion( targetPoint ); // 壁に当たっても火花
                } else {
                    raycaster.ray.at( 100, targetPoint );
                }
            }

            // ビームの描画
            drawLaser( targetPoint );
        });

        // 滑らかにリコイルを戻す
        function updateWeapon() {
            if(weaponMesh.position.z > -1.2) weaponMesh.position.z -= 0.05;
            if(weaponMesh.rotation.x < 0) weaponMesh.rotation.x += 0.02;
            if(weaponMesh.position.z <= -1.2) isShooting = false;
        }

        function drawLaser( target ) {
            const startPoint = new THREE.Vector3( 0, 0, -1.0 );
            weaponMesh.localToWorld( startPoint );
            const distance = startPoint.distanceTo(target);
            const midPoint = new THREE.Vector3().addVectors(startPoint, target).multiplyScalar(0.5);

            // ビームも強く発光させる
            const beamMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
            const beamGeo = new THREE.CylinderGeometry(0.08, 0.08, distance, 16);
            beamGeo.rotateX(Math.PI / 2);
            
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.copy(midPoint);
            beam.lookAt(target);
            
            // ビームの周囲のオーラ
            const auraMat = new THREE.MeshBasicMaterial({ color: 0x0088ff, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const auraGeo = new THREE.CylinderGeometry(0.3, 0.3, distance, 16);
            auraGeo.rotateX(Math.PI / 2);
            const aura = new THREE.Mesh(auraGeo, auraMat);
            beam.add(aura);

            scene.add(beam);

            let opacity = 1.0;
            const fade = setInterval(() => {
                opacity -= 0.15;
                beamMat.opacity = opacity;
                auraMat.opacity = opacity * 0.5;
                if(opacity <= 0) {
                    clearInterval(fade);
                    scene.remove(beam);
                    beamGeo.dispose(); beamMat.dispose(); auraGeo.dispose(); auraMat.dispose();
                }
            }, 16);
        }

        // 9. メインループ
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let bobbingTime = 0;

        function animate() {
            requestAnimationFrame( animate );
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if ( controls.isLocked ) {
                // 移動処理
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number( keys.w ) - Number( keys.s );
                direction.x = Number( keys.d ) - Number( keys.a );
                direction.normalize();

                const speed = 60.0;
                if ( keys.w || keys.s ) velocity.z -= direction.z * speed * delta;
                if ( keys.a || keys.d ) velocity.x -= direction.x * speed * delta;

                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );

                // 武器の揺れ (Bobbing) アニメーション
                const isMoving = Math.abs(velocity.x) > 1 || Math.abs(velocity.z) > 1;
                bobbingTime += delta * (isMoving ? 15 : 2); // 歩行時は早く、静止時はゆっくり
                weaponGroup.position.y = Math.sin(bobbingTime) * (isMoving ? 0.05 : 0.02);
                weaponGroup.position.x = Math.cos(bobbingTime * 0.5) * (isMoving ? 0.05 : 0.01);
            }

            // 敵の浮遊アニメーション
            enemies.forEach(enemy => {
                enemy.position.y = enemy.userData.baseY + Math.sin(time * enemy.userData.floatSpeed + enemy.userData.timeOffset) * 0.3;
            });

            // パーティクルの更新
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                const p = activeParticles[i];
                p.life -= delta * 1.5;
                
                // 重力と移動
                p.velocity.y -= 15 * delta;
                p.mesh.position.addScaledVector(p.velocity, delta);
                p.mesh.rotation.x += delta * 10;
                p.mesh.rotation.y += delta * 10;

                // 縮小とフェードアウト
                p.mesh.scale.setScalar(p.life);
                p.mesh.material.emissiveIntensity = p.life * 5;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    activeParticles.splice(i, 1);
                }
            }

            updateWeapon();

            // ※renderer.render ではなく composer.render を使うことでBloomが適用される
            composer.render();
        }
        animate();

        window.addEventListener( 'resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
            composer.setSize( window.innerWidth, window.innerHeight );
        });
    </script>
</body>
</html>
