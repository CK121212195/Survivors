<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D FPS Game</title>
    <style>
        /* 画面全体のスタイル */
        body { margin: 0; overflow: hidden; background-color: #2b2b2b; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* UIを重ねるレイヤー */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        /* 画面中央の照準 (クロスヘア) */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 4px rgba(0,0,0,0.8); }
        
        /* 画面上部のチャージゲージ (+ UI) */
        #charge-container { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 350px; display: flex; flex-direction: column; align-items: center; }
        #charge-text { color: #b0b0b0; font-size: 14px; letter-spacing: 6px; margin-bottom: 8px; font-weight: bold; }
        #charge-bar-bg { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); }
        #charge-bar-fill { width: 60%; height: 100%; background: #88ccff; } /* デモ用に60%で固定 */
        
        /* 画面左上の操作説明 (+ UI) */
        #controls-info { position: absolute; top: 30px; left: 30px; display: flex; flex-direction: column; gap: 12px; }
        .control-item { display: flex; align-items: center; color: #909090; font-size: 12px; font-weight: bold; letter-spacing: 1px;}
        .icon { width: 28px; height: 28px; background: rgba(255,255,255,0.05); border-radius: 4px; display: inline-flex; justify-content: center; align-items: center; margin-right: 12px; border: 1px solid rgba(255,255,255,0.1); color: white;}
        
        /* ゲーム開始前のクリック画面 */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; pointer-events: auto; z-index: 10; }
        #start-screen h1 { margin: 0 0 10px 0; font-size: 48px; letter-spacing: 2px;}
        #start-screen p { font-size: 16px; color: #aaa; }
    </style>

    <!-- Three.js をCDNから読み込む -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- ゲーム画面上のUI -->
    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="charge-container">
            <div id="charge-text">CHARGE</div>
            <div id="charge-bar-bg"><div id="charge-bar-fill"></div></div>
        </div>
        <div id="controls-info">
            <div class="control-item"><span class="icon">⌨️</span> MOVE</div>
            <div class="control-item"><span class="icon">🖱️</span> LOOK</div>
            <div class="control-item"><span class="icon">🔴</span> FIRE</div>
        </div>
    </div>

    <!-- マウスカーソルをロックするためのスタート画面 -->
    <div id="start-screen">
        <h1>Click to Play</h1>
        <p>W, A, S, D = 移動 / マウス = 視点 / クリック = 射撃</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. 基本セットアップ（シーン、カメラ、レンダラー）
        const scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x2a2a2a ); // 暗いグレーの背景
        scene.fog = new THREE.FogExp2( 0x2a2a2a, 0.02 ); // 奥行きの霞み（フォグ）

        const camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
        camera.position.y = 1.5; // プレイヤーの目の高さ

        const renderer = new THREE.WebGLRenderer( { antialias: true } );
        renderer.setSize( window.innerWidth, window.innerHeight );
        renderer.shadowMap.enabled = true; // 影を有効化
        document.body.appendChild( renderer.domElement );

        // 2. 照明の設定
        const ambientLight = new THREE.AmbientLight( 0xffffff, 0.3 );
        scene.add( ambientLight );

        const dirLight = new THREE.DirectionalLight( 0xffffff, 1 );
        dirLight.position.set( 10, 20, 10 );
        dirLight.castShadow = true;
        scene.add( dirLight );

        // 3. マップの作成（床と障害物のキューブ）
        const floorGeo = new THREE.PlaneGeometry( 200, 200 );
        const floorMat = new THREE.MeshStandardMaterial( { color: 0x333333, roughness: 0.8 } );
        const floor = new THREE.Mesh( floorGeo, floorMat );
        floor.rotation.x = - Math.PI / 2;
        floor.receiveShadow = true;
        scene.add( floor );

        const obstacles = [];
        const boxGeo = new THREE.BoxGeometry( 2, 2, 2 );
        const boxMat = new THREE.MeshStandardMaterial( { color: 0x555555 } );
        for ( let i = 0; i < 15; i ++ ) {
            const box = new THREE.Mesh( boxGeo, boxMat );
            box.position.set( (Math.random() - 0.5) * 60, 1, (Math.random() - 0.5) * 60 - 10 );
            box.castShadow = true; box.receiveShadow = true;
            scene.add( box );
            obstacles.push(box);
        }

        // 4. 敵（オレンジ色のカプセル）の作成
        const enemies = [];
        const enemyGeo = new THREE.CapsuleGeometry( 0.6, 1.2, 4, 16 );
        const enemyMat = new THREE.MeshStandardMaterial( { 
            color: 0xff5522, // オレンジ色
            roughness: 0.3,
            emissive: 0x331100 // 少しだけ自己発光させる
        } );

        for ( let i = 0; i < 5; i ++ ) {
            const enemy = new THREE.Mesh( enemyGeo, enemyMat.clone() );
            enemy.position.set( (Math.random() - 0.5) * 40, 1.2, -10 - Math.random() * 30 );
            enemy.castShadow = true;
            scene.add( enemy );
            enemies.push( enemy );
        }

        // 5. プレイヤーの武器（青い大砲）
        const weaponGroup = new THREE.Group();
        camera.add( weaponGroup );
        scene.add( camera );

        const weaponGeo = new THREE.CylinderGeometry( 0.25, 0.35, 1.8, 32 );
        weaponGeo.rotateX( Math.PI / 2 ); // 前を向かせる
        const weaponMaterial = new THREE.MeshStandardMaterial( { color: 0x3388ff, roughness: 0.2 } );
        const weaponMesh = new THREE.Mesh( weaponGeo, weaponMaterial );
        weaponMesh.position.set( 0.6, -0.5, -1.2 ); // 画面右下に配置
        weaponGroup.add( weaponMesh );

        // 6. 操作の制御 (PointerLockControls)
        const controls = new PointerLockControls( camera, document.body );
        const startScreen = document.getElementById( 'start-screen' );

        startScreen.addEventListener( 'click', () => controls.lock() );
        controls.addEventListener( 'lock', () => startScreen.style.display = 'none' );
        controls.addEventListener( 'unlock', () => startScreen.style.display = 'flex' );

        // キーボード移動のステータス
        const moveState = { forward: false, backward: false, left: false, right: false };
        document.addEventListener( 'keydown', ( e ) => {
            if ( e.code === 'KeyW' ) moveState.forward = true;
            if ( e.code === 'KeyS' ) moveState.backward = true;
            if ( e.code === 'KeyA' ) moveState.left = true;
            if ( e.code === 'KeyD' ) moveState.right = true;
        });
        document.addEventListener( 'keyup', ( e ) => {
            if ( e.code === 'KeyW' ) moveState.forward = false;
            if ( e.code === 'KeyS' ) moveState.backward = false;
            if ( e.code === 'KeyA' ) moveState.left = false;
            if ( e.code === 'KeyD' ) moveState.right = false;
        });

        // 7. 射撃と当たり判定 (+ ENEMY REACTION)
        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2( 0, 0 );

        document.addEventListener( 'mousedown', ( e ) => {
            if ( !controls.isLocked || e.button !== 0 ) return;

            // 射撃の反動（武器が少し後ろに下がる）
            weaponMesh.position.z += 0.2;
            setTimeout(() => { weaponMesh.position.z -= 0.2; }, 100);

            // 画面中央に向かってレイ（光線）を飛ばす
            raycaster.setFromCamera( center, camera );
            const intersects = raycaster.intersectObjects( enemies );
            
            let hitPoint;

            if ( intersects.length > 0 ) {
                // 敵に当たった場合
                const hitEnemy = intersects[ 0 ].object;
                hitPoint = intersects[ 0 ].point;
                
                // 【+ ENEMY REACTION】一瞬だけ白く強く発光し、少し潰れる
                hitEnemy.material.emissive.setHex( 0xffffff );
                hitEnemy.scale.set( 1.2, 0.8, 1.2 );
                
                setTimeout(() => {
                    hitEnemy.material.emissive.setHex( 0x331100 ); // 元に戻す
                    hitEnemy.scale.set( 1, 1, 1 );
                }, 150);
            } else {
                // 外れた場合は、奥の障害物や床、または何もない空間をターゲットにする
                const envIntersects = raycaster.intersectObjects( [floor, ...obstacles] );
                if (envIntersects.length > 0) hitPoint = envIntersects[0].point;
                else {
                    hitPoint = new THREE.Vector3();
                    raycaster.ray.at( 50, hitPoint );
                }
            }

            // ビームの描画
            drawBeam(hitPoint);
        });

        // 発射されるビームのエフェクトを作る関数
        function drawBeam(targetPoint) {
            const startPoint = new THREE.Vector3( 0, 0, -0.9 );
            weaponMesh.localToWorld( startPoint ); // 武器の先端のワールド座標

            const distance = startPoint.distanceTo(targetPoint);
            const midPoint = new THREE.Vector3().addVectors(startPoint, targetPoint).multiplyScalar(0.5);

            const beamMat = new THREE.MeshBasicMaterial({ color: 0xffaa55, transparent: true, opacity: 0.8 });
            const beamGeo = new THREE.CylinderGeometry(0.05, 0.05, distance, 8);
            beamGeo.rotateX(Math.PI / 2);
            
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.copy(midPoint);
            beam.lookAt(targetPoint);
            scene.add(beam);

            // アニメーションでスッと消す
            let opacity = 0.8;
            const fadeInterval = setInterval(() => {
                opacity -= 0.1;
                beam.material.opacity = opacity;
                if(opacity <= 0) {
                    clearInterval(fadeInterval);
                    scene.remove(beam);
                    beamGeo.dispose(); beamMat.dispose();
                }
            }, 16);
        }

        // 8. メインループ（移動と描画）
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame( animate );
            const time = performance.now();

            if ( controls.isLocked ) {
                const delta = ( time - prevTime ) / 1000;

                // 摩擦による減速
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // 入力方向の計算
                direction.z = Number( moveState.forward ) - Number( moveState.backward );
                direction.x = Number( moveState.right ) - Number( moveState.left );
                direction.normalize();

                const speed = 40.0;
                if ( moveState.forward || moveState.backward ) velocity.z -= direction.z * speed * delta;
                if ( moveState.left || moveState.right ) velocity.x -= direction.x * speed * delta;

                // 実際にカメラを動かす
                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );
            }

            prevTime = time;
            renderer.render( scene, camera );
        }
        animate();

        // ウィンドウのサイズ変更への対応
        window.addEventListener( 'resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        });

    </script>
</body>
</html>
