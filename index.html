<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web FPS - Classic Style</title>
    <style>
        /* フォントをシンプルでクリーンなものに（GIFの雰囲気に寄せる） */
        body { margin: 0; overflow: hidden; background-color: #2b2b2b; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: white; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        
        /* スコアとタイマー (右上に配置) */
        #stats-info { position: absolute; top: 30px; right: 40px; display: flex; gap: 30px; text-align: right; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stat-box { display: flex; flex-direction: column; align-items: flex-end; }
        .stat-label { font-size: 11px; color: #aaa; letter-spacing: 2px; font-weight: bold; }
        .stat-value { font-size: 32px; font-weight: bold; color: #fff; }
        #timer.danger { color: #ff5555; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        /* 左上の操作UI (GIFの再現) */
        #controls-info { position: absolute; top: 30px; left: 30px; display: flex; flex-direction: column; gap: 6px; }
        .control-item { display: flex; align-items: center; color: #ddd; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 6px 16px 6px 6px; border-radius: 6px; letter-spacing: 1px; backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.05); }
        .icon { width: 22px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 4px; display: inline-flex; justify-content: center; align-items: center; margin-right: 12px; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }

        /* 中央上部のCHARGEバー (GIFの再現) */
        #charge-container { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 350px; display: flex; flex-direction: column; align-items: center; }
        #charge-text { font-size: 12px; letter-spacing: 6px; margin-bottom: 8px; color: #999; font-weight: bold; }
        #charge-bar-bg { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; }
        #charge-bar-fill { width: 0%; height: 100%; background: #66bbee; border-radius: 2px; transition: background-color 0.2s; }
        #charge-bar-fill.overheat { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

        /* メニュー画面 */
        #menu-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 30, 30, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; pointer-events: auto; }
        .menu-title { font-size: 48px; font-weight: bold; letter-spacing: 8px; margin-bottom: 30px; color: #fff; }
        .btn { background: #444; border: none; color: #fff; padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; letter-spacing: 2px; border-radius: 4px; transition: 0.2s; margin: 10px; }
        .btn:hover { background: #66bbee; color: #000; }
        #final-score { font-size: 36px; color: #ffaa00; margin-bottom: 30px; display: none; font-weight: bold;}
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="crosshair"></div>
        <div id="controls-info">
            <div class="control-item"><span class="icon">⌨️</span> MOVE</div>
            <div class="control-item"><span class="icon">🖱️</span> LOOK</div>
            <div class="control-item"><span class="icon" style="color:#ff6666;">🔴</span> FIRE</div>
            <div class="control-item"><span class="icon">🔒</span> LOCK</div>
        </div>
        <div id="charge-container">
            <div id="charge-text">CHARGE</div>
            <div id="charge-bar-bg"><div id="charge-bar-fill"></div></div>
        </div>
        <div id="stats-info">
            <div class="stat-box"><span class="stat-label">SCORE</span><span class="stat-value" id="score-val">0</span></div>
            <div class="stat-box"><span class="stat-label">TIME</span><span class="stat-value" id="time-val">60.0</span></div>
        </div>
    </div>

    <div id="menu-layer">
        <div class="menu-title" id="menu-title">SHOOTER DEMO</div>
        <div id="final-score">SCORE: <span id="result-score">0</span></div>
        <div id="btn-container"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let gameState = 'MENU';
        let score = 0; let timeLeft = 60.0;
        let weaponHeat = 0; let isOverheated = false;
        let isFiring = false; let fireTimer = 0; const FIRE_RATE = 0.15; // 連射速度

        const hud = document.getElementById('hud');
        const menuLayer = document.getElementById('menu-layer');
        const menuTitle = document.getElementById('menu-title');
        const btnContainer = document.getElementById('btn-container');
        const finalScoreDisplay = document.getElementById('final-score');
        const scoreVal = document.getElementById('score-val');
        const timeVal = document.getElementById('time-val');
        const chargeBarFill = document.getElementById('charge-bar-fill');
        const chargeText = document.getElementById('charge-text');

        // --- 1. 環境セットアップ (GIFの淡いグレー空間を再現) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x333333 );
        scene.fog = new THREE.FogExp2( 0x333333, 0.015 ); // 霞がかった空間

        const camera = new THREE.PerspectiveCamera( 80, window.innerWidth / window.innerHeight, 0.1, 1000 );
        camera.position.y = 1.6;
        
        const renderer = new THREE.WebGLRenderer( { antialias: true } );
        renderer.setSize( window.innerWidth, window.innerHeight );
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild( renderer.domElement );

        // Bloom (光の溢れ) は控えめに設定
        const composer = new EffectComposer( renderer );
        composer.addPass( new RenderPass( scene, camera ) );
        const bloomPass = new UnrealBloomPass( new THREE.Vector2( window.innerWidth, window.innerHeight ), 0.8, 0.3, 0.6 );
        composer.addPass( bloomPass );
        composer.addPass( new OutputPass() );

        // ライティング
        scene.add( new THREE.AmbientLight( 0xffffff, 0.4 ) );
        const dirLight = new THREE.DirectionalLight( 0xffffff, 0.8 );
        dirLight.position.set( 10, 20, 10 );
        scene.add( dirLight );

        // 床と障害物 (シンプルなブロック)
        const floorGeo = new THREE.PlaneGeometry( 200, 200 );
        const floorMat = new THREE.MeshStandardMaterial( { color: 0x4a4a4a, roughness: 0.9 } );
        const floor = new THREE.Mesh( floorGeo, floorMat );
        floor.rotation.x = - Math.PI / 2;
        scene.add( floor );

        const boxGeo = new THREE.BoxGeometry( 2, 2, 2 );
        const boxMat = new THREE.MeshStandardMaterial( { color: 0x666666, roughness: 0.8 } );
        for ( let i = 0; i < 20; i ++ ) {
            const box = new THREE.Mesh( boxGeo, boxMat );
            box.position.set( (Math.random() - 0.5) * 80, 1, -10 - Math.random() * 60 );
            scene.add( box );
        }

        // --- 2. 敵 (オレンジのカプセル) ---
        const enemies = [];
        const enemyGeo = new THREE.CapsuleGeometry( 0.6, 1.2, 8, 16 );
        // 個別に光らせるためマテリアルはベースを用意してクローンする
        const baseEnemyMat = new THREE.MeshStandardMaterial( { color: 0xff6622, emissive: 0x441100, roughness: 0.4 } );

        function spawnEnemy() {
            const enemy = new THREE.Mesh( enemyGeo, baseEnemyMat.clone() );
            enemy.position.set( (Math.random() - 0.5) * 50, 1.2, -15 - Math.random() * 40 );
            // 敵にHPを持たせる (3発当たると倒れる)
            enemy.userData = { active: true, hp: 3, hitTimer: 0 };
            scene.add( enemy );
            enemies.push( enemy );
        }
        for(let i=0; i<8; i++) spawnEnemy();

        // --- 3. 武器 (丸みのある青い大砲) ---
        const weaponGroup = new THREE.Group();
        const weaponGeo = new THREE.CylinderGeometry( 0.35, 0.45, 2.0, 32 );
        weaponGeo.rotateX( Math.PI / 2 );
        const weaponMat = new THREE.MeshStandardMaterial( { color: 0x3388ff, roughness: 0.3, metalness: 0.2 } );
        const weaponMesh = new THREE.Mesh( weaponGeo, weaponMat );
        // 右下に大きく配置
        weaponMesh.position.set( 0.8, -0.5, -1.2 );
        
        // 銃口のリング
        const muzzleGeo = new THREE.TorusGeometry( 0.35, 0.05, 16, 32 );
        const muzzleMat = new THREE.MeshStandardMaterial( { color: 0xaaaaaa } );
        const muzzle = new THREE.Mesh( muzzleGeo, muzzleMat );
        muzzle.position.set( 0, 0, -1.0 );
        weaponMesh.add( muzzle );

        weaponGroup.add( weaponMesh );
        camera.add( weaponGroup );
        scene.add( camera );

        // --- 4. 弾丸 (光弾) と エフェクト ---
        const projectiles = [];
        const projGeo = new THREE.CapsuleGeometry( 0.1, 0.5, 4, 8 );
        projGeo.rotateX( Math.PI / 2 );
        const projMat = new THREE.MeshBasicMaterial( { color: 0xffaa55 } ); // オレンジの光弾

        function fireProjectile() {
            if(isOverheated) return;

            weaponHeat += 8;
            if (weaponHeat >= 100) {
                isOverheated = true; weaponHeat = 100;
                chargeText.innerText = "OVERHEATED"; chargeText.style.color = "#ff4444";
                chargeBarFill.classList.add('overheat');
            }

            // 武器の反動
            weaponMesh.position.z += 0.15;
            weaponMesh.rotation.x -= 0.05;

            // 弾丸の生成と発射
            const bullet = new THREE.Mesh( projGeo, projMat );
            // カメラ座標系での銃口の位置
            const startPos = new THREE.Vector3( 0.8, -0.4, -2.0 );
            camera.localToWorld( startPos );
            bullet.position.copy( startPos );
            
            // 画面中央に向かって飛ばす
            const target = new THREE.Vector3( 0, 0, -50 );
            camera.localToWorld( target );
            bullet.lookAt( target );
            
            // 飛ぶ方向と速度
            const velocity = new THREE.Vector3( 0, 0, -1 ).applyQuaternion( bullet.quaternion ).multiplyScalar( 80 );
            
            scene.add( bullet );
            projectiles.push( { mesh: bullet, velocity: velocity, life: 2.0 } );
        }

        // 破裂パーティクル
        const particles = [];
        const partGeo = new THREE.BoxGeometry( 0.2, 0.2, 0.2 );
        function createExplosion( pos ) {
            const mat = new THREE.MeshBasicMaterial( { color: 0xff8833 } );
            for(let i=0; i<20; i++) {
                const mesh = new THREE.Mesh( partGeo, mat );
                mesh.position.copy( pos );
                const vel = new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2).normalize().multiplyScalar(10 + Math.random()*15);
                scene.add( mesh );
                particles.push( { mesh, vel, life: 1.0 } );
            }
        }

        // --- 5. 入力とメニュー制御 ---
        const controls = new PointerLockControls( camera, document.body );
        
        function setMenu(state) {
            btnContainer.innerHTML = '';
            finalScoreDisplay.style.display = 'none';
            if(state === 'START') {
                menuTitle.innerText = "SHOOTER DEMO";
                const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = 'START';
                btn.onclick = () => { startGame(); controls.lock(); }; btnContainer.appendChild(btn);
            } else if(state === 'PAUSE') {
                menuTitle.innerText = "PAUSED";
                const btnRes = document.createElement('button'); btnRes.className = 'btn'; btnRes.innerText = 'RESUME';
                btnRes.onclick = () => controls.lock();
                btnContainer.appendChild(btnRes);
            } else if(state === 'GAMEOVER') {
                menuTitle.innerText = "TIME UP";
                finalScoreDisplay.style.display = 'block'; document.getElementById('result-score').innerText = score;
                const btnRetry = document.createElement('button'); btnRetry.className = 'btn'; btnRetry.innerText = 'TRY AGAIN';
                btnRetry.onclick = () => { startGame(); controls.lock(); }; btnContainer.appendChild(btnRetry);
            }
        }
        setMenu('START');

        controls.addEventListener( 'lock', () => { gameState = 'PLAYING'; menuLayer.style.display = 'none'; hud.style.display = 'block'; });
        controls.addEventListener( 'unlock', () => { if(gameState === 'PLAYING') { gameState = 'PAUSE'; menuLayer.style.display = 'flex'; hud.style.display = 'none'; setMenu('PAUSE'); } });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // マウス押しっぱなしで連射
        document.addEventListener('mousedown', e => { if(e.button === 0 && gameState === 'PLAYING') isFiring = true; });
        document.addEventListener('mouseup', e => { if(e.button === 0) isFiring = false; });

        function startGame() {
            score = 0; timeLeft = 60.0; weaponHeat = 0; isOverheated = false; isFiring = false;
            scoreVal.innerText = score; chargeText.innerText = "CHARGE"; chargeText.style.color = "#999"; chargeBarFill.classList.remove('overheat');
            enemies.forEach(e => scene.remove(e)); enemies.length = 0;
            for(let i=0; i<8; i++) spawnEnemy();
        }

        // --- 6. メインループ ---
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3(); const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (gameState === 'PLAYING') {
                // タイマー処理
                timeLeft -= delta;
                if(timeLeft <= 0) {
                    timeLeft = 0; gameState = 'GAMEOVER'; document.exitPointerLock();
                    menuLayer.style.display = 'flex'; hud.style.display = 'none'; setMenu('GAMEOVER');
                }
                timeVal.innerText = timeLeft.toFixed(1);
                if(timeLeft <= 10) timeVal.parentElement.id = 'timer', timeVal.parentElement.classList.add('danger');
                else timeVal.parentElement.classList.remove('danger');

                // プレイヤー移動
                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(keys.w) - Number(keys.s); direction.x = Number(keys.d) - Number(keys.a); direction.normalize();
                const speed = 50.0;
                if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);

                // 射撃・熱管理
                if(isFiring && !isOverheated) {
                    fireTimer -= delta;
                    if(fireTimer <= 0) { fireProjectile(); fireTimer = FIRE_RATE; }
                } else {
                    if(weaponHeat > 0) weaponHeat -= delta * 40;
                    if(weaponHeat <= 0) {
                        weaponHeat = 0; isOverheated = false;
                        chargeText.innerText = "CHARGE"; chargeText.style.color = "#999";
                        chargeBarFill.classList.remove('overheat');
                    }
                }
                chargeBarFill.style.width = `${weaponHeat}%`;

                // 弾丸の移動と当たり判定
                for(let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.life -= delta;

                    let hit = false;
                    // 敵との衝突判定 (簡易的な距離判定)
                    for(let j = 0; j < enemies.length; j++) {
                        const enemy = enemies[j];
                        if(!enemy.userData.active) continue;
                        
                        if(p.mesh.position.distanceTo(enemy.position) < 1.5) {
                            hit = true;
                            enemy.userData.hp--;
                            
                            // 【+ ENEMY REACTION】白く光って少し潰れる
                            enemy.material.emissive.setHex(0xffffff);
                            enemy.scale.set(1.3, 0.7, 1.3);
                            enemy.userData.hitTimer = 0.1; // 0.1秒後に元に戻す

                            if(enemy.userData.hp <= 0) {
                                enemy.userData.active = false;
                                scene.remove(enemy);
                                createExplosion(enemy.position);
                                score += 100; timeLeft = Math.min(timeLeft + 2.0, 99.9);
                                scoreVal.innerText = score;
                                setTimeout(spawnEnemy, 1000);
                            }
                            break;
                        }
                    }

                    if(hit || p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
                }

                // 敵のリアクション戻し処理
                enemies.forEach(enemy => {
                    if(enemy.userData.active && enemy.userData.hitTimer > 0) {
                        enemy.userData.hitTimer -= delta;
                        if(enemy.userData.hitTimer <= 0) {
                            enemy.material.emissive.setHex(0x441100);
                            enemy.scale.set(1, 1, 1);
                        }
                    }
                });

                // 武器のリコイル戻し
                if(weaponMesh.position.z > -1.2) weaponMesh.position.z -= delta * 2;
                if(weaponMesh.rotation.x < 0) weaponMesh.rotation.x += delta;
            }

            // パーティクルの更新
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta * 1.5;
                p.vel.y -= 20 * delta;
                p.mesh.position.addScaledVector(p.vel, delta);
                p.mesh.scale.setScalar(p.life);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
